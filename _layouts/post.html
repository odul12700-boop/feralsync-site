---
layout: default
---
<article class="post">
  <p class="post-date">{{ page.date | date: "%d/%m/%Y" }}</p>
  <h1>{{ page.title }}</h1>
  {{ content }}
  <div class="post-footer-note">
    Cet article est proposé à titre informatif. Avant toute modification de votre
    alimentation ou de votre complémentation, demandez conseil à un professionnel de santé.
  </div>
  <p><a href="{{ '/actualites/' | relative_url }}">← Toutes les actualités</a></p>
</article>
